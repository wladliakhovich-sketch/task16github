name: Send Email on Commit
on:
  push:
jobs:
  send-email:
    runs-on: ubuntu-latest

    steps:
      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "New commit pushed"
          body: "A new commit was pushed to your repository."
          to: wladliakhovich@gmail.com
          from: wladliakhovich@gmail.com
